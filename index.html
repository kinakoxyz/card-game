<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲーム内時計（通知版）</title>
<style>
:root{--bg:#0f1724;--card:#0b1220;--accent:#60a5fa;--muted:#9ca3af}
html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo, sans-serif;background:linear-gradient(180deg,#071024 0%,#071428 100%);color:#e6eef8}
.wrap{max-width:860px;margin:36px auto;padding:24px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;box-shadow:0 6px 30px rgba(2,6,23,0.7)}
h1{margin:0 0 8px 0;font-size:20px}
.row{display:flex;gap:18px;align-items:center}
.card{background:var(--card);padding:14px;border-radius:10px;flex:1;min-width:0}
.big{font-size:36px;font-weight:700}
.small{color:var(--muted);font-size:13px}
.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,0.03);font-size:13px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
input[type="time"]{margin-right:8px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
.notice{margin-top:12px;color:var(--muted);font-size:13px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.legend span{font-size:13px;color:var(--muted)}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{border:1px solid #333;padding:6px;text-align:left;font-size:13px}
.checkbox{width:16px;height:16px}
#dayPeriod{font-weight:bold;margin-top:8px;font-size:24px;}
</style>
</head>
<body>
<div class="wrap">
<h1>ゲーム内時計（通知版）</h1>

<div class="row" style="margin-top:12px;">
  <div class="card">
    <div class="small">現実時間（ローカル）</div>
    <div id="realTime" class="big mono">--:--:--</div>
    <div class="small">現在の分は <span id="realMinute">--</span> 分、サイクル内経過 <span id="cycleSec">--</span> 秒</div>
  </div>
  <div class="card">
    <div class="small">ゲーム内時間</div>
    <div id="gameTime" class="big mono">--:--</div>
    <div id="dayPeriod"></div>
  </div>
</div>

<div style="display:flex;gap:12px;margin-top:14px;align-items:flex-start;">
  <div class="card" style="flex:0 0 320px;">
    <label>任意の現実時間でシミュレートする（オフで現在時刻）</label>
    <input id="timeInput" type="time">
    <button id="resetBtn">リセット</button>
    <div class="notice">チェックした魚・渦だけ通知されます。「リセット」で現在のローカル時刻に戻ります。</div>
  </div>

  <div class="card" style="flex:1;">
    <div class="small">ルール（固定）</div>
    <div class="pill">ゲーム内1時間 = 現実 1分15秒 (75秒)</div>
    <div class="pill" style="margin-left:8px;">現実 30分 = ゲーム 24時間</div>
    <div class="legend">
      <span>※ 昼はゲーム内07:00～18:59、夜はそれ以外</span>
    </div>
  </div>
</div>

<h2>魚リスト</h2>
<table id="fishTable">
  <thead><tr><th>通知</th><th>名前</th><th>場所</th><th>時間</th><th>サイズ</th></tr></thead>
  <tbody></tbody>
</table>

<h2>渦リスト</h2>
<table id="whirlTable">
  <thead><tr><th>通知</th><th>名前</th><th>発生パターン</th></tr></thead>
  <tbody></tbody>
</table>

<audio id="pingSound" src="ping.mp3" preload="auto"></audio>

<footer>
表示はローカル端末の時刻を利用しています。ブラウザで開いてそのまま使えます。
</footer>
</div>

<script>
// -------------------- データ --------------------
const fishData = [
{"name":"アマゾンカワイルカ","category":"一般魚","ranges":[["12:00","14:00"]],"location":"ファッションモール、サンリオホテル","size":"超特大"},
{"name":"マッコウクジラ","category":"一般魚","ranges":[["00:00","04:00"]],"location":"ボート/ブルーホール","size":"超特大"},
{"name":"シロナガスクジラ","category":"一般魚","ranges":[["09:00","14:00"]],"location":"灯台","size":"超特大"},
{"name":"ジンベエザメ","category":"一般魚","ranges":[["00:00","04:00"]],"location":"ボート","size":"超特大"},
{"name":"ジュゴン","category":"一般魚","ranges":[["12:00","15:00"]],"location":"ファッションモール","size":"特大"},
{"name":"タテゴトアザラシ","category":"一般魚","ranges":[["11:00","15:00"],["00:00","04:00"]],"location":"灯台/ブルーホール","size":"特大"},
{"name":"ニシオンデンザメ","category":"一般魚","ranges":[["00:00","04:00"]],"location":"ブルーホール","size":"超特大"},
{"name":"白いシロナガスクジラ","category":"巨大魚","ranges":[["10:00","14:00"]],"location":"灯台","size":"超特大"},
{"name":"白いザトウクジラ","category":"巨大魚","ranges":[["11:30","12:00"]],"location":"ビーチリゾートの遠い海だけ？","size":"巨大魚"},
{"name":"白いマッコウクジラ","category":"巨大魚","ranges":[["11:30","12:00"]],"location":"ビーチリゾートの遠い海だけ？","size":"巨大魚"},
{"name":"ミニピンクイルカ","category":"ミニ","ranges":[["12:00","14:00"]],"location":"ファッションモール、サンリオホテル","size":"小"},
{"name":"ミニマッコウクジラ","category":"ミニ","ranges":[["00:00","04:00"]],"location":"ボート","size":"小"},
{"name":"ミニシロナガスクジラ","category":"ミニ","ranges":[["09:00","12:00"]],"location":"灯台","size":"小"},
{"name":"たい焼きアイスクリーム","category":"特殊","ranges":[["00:00","05:59"],["12:00","13:59"]],"location":"キャンプ場の湖/滝","size":"大"}
];

const whirlData = [
{"name":"マカジキ"},
{"name":"パターン1"},
{"name":"パターン2"},
{"name":"パターン3"}
];

// -------------------- 時計 & 昼夜 --------------------
const elReal = document.getElementById('realTime');
const elGame = document.getElementById('gameTime');
const elRealMinute = document.getElementById('realMinute');
const elCycleSec = document.getElementById('cycleSec');
const timeInput = document.getElementById('timeInput');
const resetBtn = document.getElementById('resetBtn');
const elDayPeriod = document.getElementById('dayPeriod');
const ping = document.getElementById('pingSound');

let simulate=false;
let notified=[];

const REAL_CYCLE_SECONDS=30*60;
const GAME_SECONDS_PER_REAL_SECOND=(24*3600)/REAL_CYCLE_SECONDS;

function z(n,d=2){return String(n).padStart(d,'0');}

function mapRealToGame(realDate){
  const minutes=realDate.getMinutes();
  const seconds=realDate.getSeconds();
  const ms=realDate.getMilliseconds();
  const secondsFromHour=minutes*60+seconds+ms/1000;
  const cycleSeconds=secondsFromHour%REAL_CYCLE_SECONDS;
  const gameTotalSeconds=cycleSeconds*GAME_SECONDS_PER_REAL_SECOND;
  const gameH=Math.floor(gameTotalSeconds/3600)%24;
  const gameM=Math.floor((gameTotalSeconds%3600)/60);
  return {gameH,gameM,cycleSeconds};
}

function formatGame(g){return `${z(g.gameH)}:${z(g.gameM)}`;}

function updateDayPeriod(gameH,cycleSec){
  const dayStart1=8*60+45;
  const dayEnd1=23*60+44;
  const dayStart2=dayStart1+30*60;
  const dayEnd2=dayEnd1+30*60;
  let period='夜';
  if((cycleSec>=dayStart1 && cycleSec<=dayEnd1)||(cycleSec>=dayStart2 && cycleSec<=dayEnd2)){
    period='昼';
  }
  elDayPeriod.textContent=`現在：${period}`;
  elDayPeriod.style.color=(period==='昼')?'orange':'blue';
}

// -------------------- テーブル生成 --------------------
function populateTables(){
  const fishTable=document.getElementById('fishTable').getElementsByTagName('tbody')[0];
  fishTable.innerHTML="";
  fishData.forEach(f=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input type="checkbox" class="notifyCheckbox checkbox" checked></td>
                  <td>${f.name}</td><td>${f.location}</td><td>${f.ranges.map(r=>r.join('〜')).join(' / ')}</td><td>${f.size}</td>`;
    fishTable.appendChild(tr);
  });
  const whirlTable=document.getElementById('whirlTable').getElementsByTagName('tbody')[0];
  whirlTable.innerHTML="";
  whirlData.forEach(w=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input type="checkbox" class="notifyCheckbox checkbox" checked></td>
                  <td>${w.name}</td><td>発生時間パターンあり</td>`;
    whirlTable.appendChild(tr);
  });
}

// -------------------- 通知処理 --------------------
function checkNotifications(now){
  const hhmm=z(now.getHours())+":"+z(now.getMinutes());
  const checkboxes=document.querySelectorAll('.notifyCheckbox');
  const allData=[...fishData,...whirlData];
  allData.forEach((item,i)=>{
    const cb=checkboxes[i];
    if(!cb.checked) return;
    // 魚の範囲チェック
    if(item.ranges){
      item.ranges.forEach(r=>{
        if(hhmm===r[0] && !notified.includes(item.name)){
          ping.play();
          notified.push(item.name);
        }
      });
    }
  });
}

// -------------------- tick --------------------
function tick(){
  let now=new Date();
  if(simulate && timeInput.value){
    const [hh,mm]=timeInput.value.split(':').map(Number);
    now.setHours(hh,mm,0,0);
  }
  elReal.textContent=`${z(now.getHours())}:${z(now.getMinutes())}:${z(now.getSeconds())}`;
  const res=mapRealToGame(now);
  elGame.textContent=formatGame(res);
  elRealMinute.textContent=now.getMinutes();
  elCycleSec.textContent=Math.floor(res.cycleSeconds/1);
  updateDayPeriod(res.gameH,res.cycleSec/1);
  checkNotifications(now);
}

timeInput.addEventListener('input',()=>{simulate=!!timeInput.value; tick();});
resetBtn.addEventListener('click',()=>{simulate=false;timeInput.value=""; tick(); notified=[];});
populateTables();
tick();
setInterval(tick,250);
</script>
</body>
</html>
