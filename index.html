<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0e0e18;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #ffd700, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 12px;
    color: #555;
    letter-spacing: 2px;
    margin-bottom: 48px;
    text-align: center;
  }
  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 600px;
  }
  .game-card {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px 20px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .game-card:hover {
    border-color: rgba(255,215,0,0.4);
    transform: translateY(-4px);
  }
  .game-icon { font-size: 36px; }
  .game-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    color: #ffd700;
    letter-spacing: 1px;
  }
  .game-desc {
    font-size: 12px;
    color: #888;
    line-height: 1.6;
  }
  .game-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: #aaa;
    margin-top: 4px;
    width: fit-content;
  }
</style>
</head>
<body>
  <h1>GAMES</h1>
  <p class="subtitle">非公式ファンメイド</p>
  <div class="games">
    <a class="game-card" href="./ranking-card-game/">
      <span class="game-icon">🎭</span>
      <span class="game-title">RANKING CARD</span>
      <span class="game-desc">序列を決めながら手札を出し切るカードゲーム。リアルタイム対戦対応。</span>
      <span class="game-tag">2〜6人 / オンライン対戦</span>
    </a>
    <a class="game-card" href="./number-card-game/">
      <span class="game-icon">🔢</span>
      <span class="game-title">NUMBER CARD</span>
      <span class="game-desc">1〜9のカードで戦う心理戦。相手の色の残り枚数だけを手がかりに、先に5勝を目指す推理カードゲーム。</span>
      <span class="game-tag">2人 / オンライン対戦</span>
    </a>
  </div>
</body>
</html>
